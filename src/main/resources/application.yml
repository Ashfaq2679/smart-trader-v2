server:
  port: ${SERVER_PORT:7070}
spring:
  application:
    name: smart-trader-v2
  data:
    mongodb:
      # Lets @Indexed(expireAfterSeconds=...) (e.g. LiquidityPool's TTL index) create
      # itself at startup instead of requiring a manual index-creation step.
      auto-index-creation: true

coinbase:
  api:
    base-url: ${COINBASE_API_BASE_URL:https://api.coinbase.com}
    bearer-token: ${COINBASE_BEARER_TOKEN:}
    api-secret: ${COINBASE_API_SECRET:}

# v2.5 feature configuration, per V2_5_IMPLEMENTATION_PLAN_INCREMENTAL.md section 0.6.
# Not yet consumed by any bean (Phase 0 is additive-only) - these values are the
# priors Phase 1A (liquidity) and 1B (crowd positioning) will read.
smart-trader:
  v2_5:
    liquidity:
      ttl-days: 5
      eqh-eql-threshold: 0.15 # 0.15 x ATR
    crowd-positioning:
      funding-percentile-crowded-long: 90
      funding-percentile-crowded-short: 10
      oi-change-threshold: 0.15
    cascade:
      bar-range-multiplier: 3
      oi-change-threshold: -0.05
